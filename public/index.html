<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Team Task Manager Dashboard - Track your projects and tasks">
  <title>Dashboard — TaskFlow</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-brand">TaskFlow</div>
    <div class="nav-links">
      <a href="/" class="nav-link active">Dashboard</a>
      <a href="/projects.html" class="nav-link">Projects</a>
    </div>
    <div class="nav-user">
      <div class="nav-avatar" id="navAvatar"></div>
      <span class="nav-username" id="navName"></span>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page-container fade-in">
    <div class="page-header">
      <h1>Dashboard</h1>
      <p>Overview of your tasks and projects</p>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card accent"><div class="stat-value" id="totalTasks">-</div><div class="stat-label">Total Tasks</div></div>
      <div class="stat-card info"><div class="stat-value" id="totalProjects">-</div><div class="stat-label">Projects</div></div>
      <div class="stat-card success"><div class="stat-value" id="doneTasks">-</div><div class="stat-label">Completed</div></div>
      <div class="stat-card warning"><div class="stat-value" id="myTasks">-</div><div class="stat-label">My Tasks</div></div>
      <div class="stat-card danger"><div class="stat-value" id="overdueTasks">-</div><div class="stat-label">Overdue</div></div>
    </div>

    <!-- Charts -->
    <div class="charts-grid" id="chartsArea">
      <div class="chart-card">
        <h3>Tasks by Status</h3>
        <div class="bar-chart" id="statusChart"></div>
      </div>
      <div class="chart-card">
        <h3>Tasks per Project</h3>
        <div class="bar-chart" id="projectChart"></div>
      </div>
    </div>

    <!-- Overdue Tasks -->
    <div id="overdueSection" style="display:none">
      <div class="section-header"><h2>⚠️ Overdue Tasks</h2></div>
      <div class="overdue-list" id="overdueList"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
