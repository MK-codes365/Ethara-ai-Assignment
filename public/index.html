<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Team Task Manager Dashboard - Track your projects and tasks">
  <title>Dashboard — TaskFlow</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .welcome-banner {
      background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg);
      padding:32px 36px; margin-bottom:32px; position:relative; overflow:hidden;
      backdrop-filter:blur(16px);
    }
    .welcome-banner::before {
      content:''; position:absolute; top:0; right:0; width:300px; height:100%;
      background:linear-gradient(135deg, rgba(99,102,241,0.08), rgba(139,92,246,0.06));
      border-radius:0 var(--radius-lg) var(--radius-lg) 0;
    }
    .welcome-banner h2 { font-size:24px; font-weight:700; margin-bottom:6px; position:relative; }
    .welcome-banner p { color:var(--text-muted); font-size:14px; position:relative; }
    .welcome-banner .welcome-time {
      color:var(--accent); font-weight:600; font-size:13px; margin-top:8px;
      position:relative;
    }
    .stat-card .stat-icon {
      width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center;
      font-size:20px; margin-bottom:14px;
    }
    .stat-card.accent .stat-icon { background:rgba(99,102,241,0.12); }
    .stat-card.info .stat-icon { background:rgba(59,130,246,0.12); }
    .stat-card.success .stat-icon { background:rgba(34,197,94,0.12); }
    .stat-card.warning .stat-icon { background:rgba(245,158,11,0.12); }
    .stat-card.danger .stat-icon { background:rgba(239,68,68,0.12); }
    .overdue-section-header {
      display:flex; align-items:center; gap:10px; margin-bottom:16px;
    }
    .overdue-section-header h2 { font-size:18px; font-weight:700; }
    .overdue-badge {
      background:rgba(239,68,68,0.12); color:#f87171; padding:4px 12px; border-radius:20px;
      font-size:12px; font-weight:700;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-brand">TaskFlow</div>
    <div class="nav-links">
      <a href="/" class="nav-link active">Dashboard</a>
      <a href="/projects.html" class="nav-link">Projects</a>
    </div>
    <div class="nav-user">
      <div class="nav-avatar" id="navAvatar"></div>
      <span class="nav-username" id="navName"></span>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page-container fade-in">
    <!-- Welcome Banner -->
    <div class="welcome-banner">
      <h2 id="welcomeMsg">Welcome back!</h2>
      <p>Here's a quick overview of your tasks and projects</p>
      <div class="welcome-time" id="welcomeTime"></div>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card accent">
        <div class="stat-icon">📋</div>
        <div class="stat-value" id="totalTasks">-</div>
        <div class="stat-label">Total Tasks</div>
      </div>
      <div class="stat-card info">
        <div class="stat-icon">📁</div>
        <div class="stat-value" id="totalProjects">-</div>
        <div class="stat-label">Projects</div>
      </div>
      <div class="stat-card success">
        <div class="stat-icon">✅</div>
        <div class="stat-value" id="doneTasks">-</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card warning">
        <div class="stat-icon">⚡</div>
        <div class="stat-value" id="myTasks">-</div>
        <div class="stat-label">My Tasks</div>
      </div>
      <div class="stat-card danger">
        <div class="stat-icon">⏰</div>
        <div class="stat-value" id="overdueTasks">-</div>
        <div class="stat-label">Overdue</div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts-grid" id="chartsArea">
      <div class="chart-card">
        <h3>Tasks by Status</h3>
        <div class="bar-chart" id="statusChart"></div>
      </div>
      <div class="chart-card">
        <h3>Tasks per Project</h3>
        <div class="bar-chart" id="projectChart"></div>
      </div>
    </div>

    <!-- Overdue Tasks -->
    <div id="overdueSection" style="display:none">
      <div class="overdue-section-header">
        <h2>⚠️ Overdue Tasks</h2>
        <span class="overdue-badge" id="overdueCount">0</span>
      </div>
      <div class="overdue-list" id="overdueList"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script>
    // Welcome message with time
    const user = getUser();
    if (user) {
      const hour = new Date().getHours();
      const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
      document.getElementById('welcomeMsg').textContent = `${greeting}, ${user.name}! 👋`;
    }
    const now = new Date();
    document.getElementById('welcomeTime').textContent =
      now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  </script>
</body>
</html>
