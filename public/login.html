<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Team Task Manager - Sign in to manage your projects and tasks">
  <title>Login — TaskFlow</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .password-field { position:relative; }
    .password-toggle {
      position:absolute; right:14px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:16px;
      padding:4px; transition:color .2s;
    }
    .password-toggle:hover { color:var(--text-primary); }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-container fade-in">
      <div class="auth-header">
        <h1>TaskFlow</h1>
        <p>Collaborate. Organize. Deliver.</p>
      </div>
      <div class="auth-card">
        <div class="auth-tabs">
          <div class="auth-tab active" onclick="switchTab('login')">Sign In</div>
          <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
        </div>
        <!-- Login Form -->
        <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <div class="password-field">
              <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required>
              <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">👁</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="loginBtn">Sign In →</button>
        </form>
        <!-- Signup Form -->
        <form id="signupForm" class="auth-form" onsubmit="handleSignup(event)">
          <div class="form-group">
            <label for="signupName">Full Name</label>
            <input type="text" id="signupName" class="form-input" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label for="signupEmail">Email Address</label>
            <input type="email" id="signupEmail" class="form-input" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="signupPassword">Password</label>
            <div class="password-field">
              <input type="password" id="signupPassword" class="form-input" placeholder="Min 6 characters" required minlength="6">
              <button type="button" class="password-toggle" onclick="togglePassword('signupPassword', this)">👁</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="signupBtn">Create Account →</button>
        </form>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
      else { input.type = 'password'; btn.textContent = '👁'; }
    }
  </script>
</body>
</html>
