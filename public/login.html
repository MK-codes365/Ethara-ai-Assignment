<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Team Task Manager - Sign in to manage your projects and tasks">
  <title>Login — Team Task Manager</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container fade-in">
      <div class="auth-header">
        <h1>TaskFlow</h1>
        <p>Collaborate. Organize. Deliver.</p>
      </div>
      <div class="auth-card">
        <div class="auth-tabs">
          <div class="auth-tab active" onclick="switchTab('login')">Sign In</div>
          <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
        </div>
        <!-- Login Form -->
        <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
        </form>
        <!-- Signup Form -->
        <form id="signupForm" class="auth-form" onsubmit="handleSignup(event)">
          <div class="form-group">
            <label for="signupName">Full Name</label>
            <input type="text" id="signupName" class="form-input" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" class="form-input" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" class="form-input" placeholder="Min 6 characters" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary" id="signupBtn">Create Account</button>
        </form>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
