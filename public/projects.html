<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Manage your projects in Team Task Manager">
  <title>Projects — TaskFlow</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .project-card {
      position:relative;
    }
    .project-card::after {
      content:''; position:absolute; bottom:0; left:24px; right:24px; height:1px;
      background:linear-gradient(90deg, transparent, rgba(99,102,241,0.2), transparent);
      opacity:0; transition:opacity .3s;
    }
    .project-card:hover::after { opacity:1; }
    .project-card .project-header {
      display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;
    }
    .project-card .project-avatar {
      width:44px; height:44px; border-radius:14px; display:flex; align-items:center;
      justify-content:center; font-size:20px; font-weight:800; margin-bottom:16px;
    }
    .project-card:nth-child(4n+1) .project-avatar { background:linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.15)); color:#818cf8; }
    .project-card:nth-child(4n+2) .project-avatar { background:linear-gradient(135deg, rgba(59,130,246,0.2), rgba(6,182,212,0.15)); color:#60a5fa; }
    .project-card:nth-child(4n+3) .project-avatar { background:linear-gradient(135deg, rgba(34,197,94,0.2), rgba(16,185,129,0.15)); color:#4ade80; }
    .project-card:nth-child(4n+4) .project-avatar { background:linear-gradient(135deg, rgba(245,158,11,0.2), rgba(249,115,22,0.15)); color:#fbbf24; }
    .projects-header {
      display:flex; align-items:center; justify-content:space-between; margin-bottom:32px;
    }
    .projects-header h1 {
      font-size:30px; font-weight:800; letter-spacing:-.5px;
      background:linear-gradient(135deg, #f1f5f9, #cbd5e1);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .projects-header p { color:var(--text-muted); font-size:15px; margin-top:4px; }
    .project-stats-row {
      display:flex; gap:16px; margin-top:16px; padding-top:16px; border-top:1px solid var(--border);
    }
    .project-stat {
      display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-muted);
    }
    .project-stat-dot {
      width:8px; height:8px; border-radius:50%;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">TaskFlow</div>
    <div class="nav-links">
      <a href="/" class="nav-link">Dashboard</a>
      <a href="/projects.html" class="nav-link active">Projects</a>
    </div>
    <div class="nav-user">
      <div class="nav-avatar" id="navAvatar"></div>
      <span class="nav-username" id="navName"></span>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page-container fade-in">
    <div class="projects-header">
      <div><h1>Projects</h1><p>Your projects and teams</p></div>
      <button class="btn btn-primary" onclick="openCreateModal()">+ New Project</button>
    </div>
    <div class="card-grid" id="projectsList"><div class="loading">Loading projects...</div></div>
  </div>

  <!-- Create Project Modal -->
  <div class="modal-overlay" id="createModal">
    <div class="modal">
      <h2>Create New Project</h2>
      <form onsubmit="handleCreateProject(event)">
        <div class="form-group">
          <label for="projectName">Project Name</label>
          <input type="text" id="projectName" class="form-input" placeholder="My awesome project" required>
        </div>
        <div class="form-group">
          <label for="projectDesc">Description (optional)</label>
          <textarea id="projectDesc" class="form-input" placeholder="What is this project about?"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeCreateModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="createBtn">Create Project</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/projects.js"></script>
</body>
</html>
